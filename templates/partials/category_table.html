<table id="tabla-categorias" class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
        <tr>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descripción</th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha Creación</th>
            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
        </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
        {% for category in categories %}
        <tr>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ category.category_name }}</td>
            <td class="px-6 py-4 text-sm text-gray-500">{{ category.category_description }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ category.created_at|date:"d M Y" }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <button hx-delete="{% url 'admin_delete_category' category.pk %}" 
                        hx-confirm="¿Estás seguro de eliminar esta categoría?" 
                        hx-target="closest tr" 
                        hx-swap="outerHTML" 
                        class="text-red-600 hover:text-red-900 transition-colors">
                    Eliminar
                </button>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center">No hay categorías registradas.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
